services:
  trader_bot:
    build: .
    container_name: binance_trader_bot
    init: true
    stop_grace_period: 15s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "healthcheck.py", "--quick"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    volumes:
      - .:/app
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - TZ=UTC